name: boatrace-update

# 3時間毎更新（09:00〜21:00 JST = 1日5回）：当日の展示・結果・鉄板EVだけを取得して
# today.html が自動読込する update.json を更新する（予想は朝の daily で確定済み・ここでは触らない）。
# 結果(的中/配当)が時間とともに反映される。commit&push → Cloudflare 自動再デプロイ。
# ★Cloudflare Pages ビルド500回/月に収めるため2時間毎→3時間毎に削減（5回/日）。
# ★加えて today.html の「更新」ボタンが /api/refresh 経由で workflow_dispatch を叩き、オンデマンド収集も可能。
# GitHub cron は UTC（09:00 JST=00:00 UTC）。
on:
  schedule:
    - cron: '0 0-12/3 * * *'   # 00,03,06,09,12 UTC = 09,12,15,18,21 JST（5回）
  workflow_dispatch:

concurrency:
  group: boatrace-update     # 更新ジョブ同士の多重実行は直列化
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4

      - name: compute JST day
        id: day
        run: echo "d=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: boatrace/requirements.txt

      - name: install deps
        run: pip install -r boatrace/requirements.txt

      # daily が保存した派生CSV(予測/特徴量)を取り出す。serve_odds がEV算出に読む。
      # 当日キー優先・無ければ最新の boatrace-derived-* にフォールバック。
      - name: restore derived CSV cache (from daily job)
        id: derived
        uses: actions/cache/restore@v4
        with:
          path: |
            boatrace/predict_win.csv
            boatrace/features_race_relative.csv
            boatrace/features_player_history.csv
          key: boatrace-derived-${{ steps.day.outputs.d }}
          restore-keys: |
            boatrace-derived-

      # cache miss（その日 daily 未実行/cache失効）なら update.json を触らず終了し
      # 前回分を温存（壊さない）。次の daily で cache が再生成され自己修復する。
      - name: guard - skip if derived CSV missing
        id: guard
        working-directory: boatrace
        run: |
          if [ -f predict_win.csv ] && [ -f features_race_relative.csv ] && [ -f features_player_history.csv ]; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "ok=0" >> "$GITHUB_OUTPUT"
            echo "::warning::derived CSV cache miss — skip update.json (keep previous; next daily self-heals)"
          fi

      - name: collect exhibition / results / EV
        if: steps.guard.outputs.ok == '1'
        working-directory: boatrace
        run: python ci_update.py

      - name: commit & push update.json
        run: |
          git config user.name  "boatrace-bot"
          git config user.email "actions@users.noreply.github.com"
          git add boatrace/update.json boatrace/data
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "chore(boatrace): update $(date +%H:%M) JST"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master && git push origin master && exit 0
            echo "push race, retry $i"; sleep 5
          done
          echo "push failed after retries"; exit 1
