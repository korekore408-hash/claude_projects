name: boatrace-daily

# 朝1回：前日Kで履歴更新 → 当日Bで出走表 → 特徴量再計算 → 予測 → today.html 生成。
# 生成物（today.html・各CSV）をリポジトリに commit & push し、Cloudflare Pages が自動再デプロイする。
on:
  schedule:
    - cron: '17 19 * * *'   # 19:17 UTC = 翌04:17 JST。GitHubのcron遅延(混雑時は数十分〜数時間)を見込み朝6時前に当日ページを用意。:00/正時は混雑するため避ける
  workflow_dispatch:        # 手動実行も可

concurrency:
  group: boatrace-daily
  cancel-in-progress: false

permissions:
  contents: write           # 生成物をリポジトリに push するため

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Tokyo         # daily.py の date.today() を JST にする
    steps:
      - uses: actions/checkout@v4

      - name: compute JST day
        id: day
        run: echo "d=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: boatrace/requirements.txt

      - name: install deps
        run: pip install -r boatrace/requirements.txt

      - name: run daily pipeline
        working-directory: boatrace
        run: python daily.py --date "$(date +%Y-%m-%d)"

      # 派生CSV(計~88MB)は git に置かず cache で update ジョブへ受け渡す（リポジトリ肥大回避）。
      # update(boatrace-update.yml)が同じキーで restore する。同日の再実行ではキー重複で
      # 「already exists」警告のみ（非致命）。古いキーは7日/LRUで自然消滅。
      - name: save derived CSV cache (for update job)
        uses: actions/cache/save@v4
        with:
          path: |
            boatrace/predict_win.csv
            boatrace/features_race_relative.csv
            boatrace/features_player_history.csv
          key: boatrace-derived-${{ steps.day.outputs.d }}

      - name: commit & push generated files
        run: |
          git config user.name  "boatrace-bot"
          git config user.email "actions@users.noreply.github.com"
          # 派生CSV(predict_win/features_*)は .gitignore 済み＝commit対象外（cacheで配布）。
          git add boatrace/today.html boatrace/today.pdf boatrace/viewer.html \
                  boatrace/race_flags.csv boatrace/data
          if git diff --cached --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "chore(boatrace): daily build $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master && git push origin master && exit 0
            echo "push race, retry $i"; sleep 5
          done
          echo "push failed after retries"; exit 1
