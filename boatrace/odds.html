<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>オッズ一覧</title>
<!--
  オッズ一覧（別ページ）: today.html のレース詳細「オッズ一覧」ボタンから開く。
  /api/odds（2連単30点）+ /api/odds?type=3t（3連単120点）を直取りし全組を表示。
  URLパラメータ: id=12桁race_id(jcd2+YYYYMMDD+rno2) / v=場名 / no=R番 / tm=締切
                 b2=本線2連単(1-4,1-2,…) / b3=本線3連単 / ba=穴予想6点 …AI買い目ハイライト用
  約2分毎に自動更新（サーバ側90秒キャッシュ・タブ非表示中はスキップ）。クラウド専用。
-->
<style>
  body{font-family:"Yu Gothic UI",system-ui,sans-serif;margin:0 auto;padding:12px 14px 40px;
       background:#0f1115;color:#e6e6e6;max-width:560px}
  h1{font-size:17px;margin:4px 0 2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .meta{font-size:12px;color:#9aa3b2;margin:0 0 10px}
  .upbtn{margin-left:auto;padding:5px 14px;font-size:12px;font-weight:600;color:#43c59e;
         background:#10231d;border:1px solid #2f6f57;border-radius:8px;cursor:pointer}
  .upbtn:disabled{opacity:.5}
  .sec{font-size:13px;font-weight:600;color:#9aa3b2;margin:18px 0 6px;display:flex;align-items:center;gap:8px}
  .kbadge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:9px;color:#8fa8d0;
          background:#141a26;border:1px solid #2a3852}
  .mc{display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;border-radius:4px;
      font-size:11px;font-weight:700;vertical-align:middle}
  table{border-collapse:collapse;width:100%;font-size:11.5px;table-layout:fixed}
  th{font-weight:600;color:#9aa3b2;padding:3px 1px;border-bottom:1px solid #2a2f3a}
  td{padding:4px 1px;text-align:center;border-bottom:0.5px solid #1c2029;color:#cfd6e1;
     white-space:nowrap;overflow:hidden}
  td .lane{color:#8791a3;font-weight:600;margin-right:2px}
  td.hl2{background:#10231d;box-shadow:inset 0 0 0 1px #2f6f57;border-radius:4px;color:#7fe0bf;font-weight:700}
  td.hl3{background:#10231d;box-shadow:inset 0 0 0 1px #2f6f57;border-radius:4px;color:#7fe0bf;font-weight:700}
  td.hla{background:#1c1526;box-shadow:inset 0 0 0 1px #5a3f8f;border-radius:4px;color:#c79bff;font-weight:700}
  td.na{color:#4a5261}
  .blk{margin:8px 0 14px}
  .crow{display:flex;align-items:center;gap:6px;padding:6px 2px;border-bottom:0.5px solid #2a2f3a;font-size:13px}
  .crow .arr{color:#5d6675;font-size:11px}
  .crow .rk{width:38px;font-size:10px;color:#8791a3;font-weight:600;flex:none}
  .crow .oz{margin-left:auto;font-weight:700;font-size:14px}
  .crow .pop{font-size:10px;color:#8791a3;width:64px;text-align:right;flex:none}
  .err{margin:14px 0;padding:10px 12px;border:1px solid #5a2a2a;border-radius:8px;background:#231313;
       color:#f0a5a5;font-size:12.5px}
  .note{font-size:11px;color:#7e8796;margin-top:14px;line-height:1.6}
  a.back{color:#8fa8d0;font-size:12.5px;text-decoration:none}
</style>
</head>
<body>
<div id="app">読み込み中…</div>
<script>
(function(){
'use strict';
var LC={1:['#ffffff','#111111'],2:['#1b1b1b','#ffffff'],3:['#e23b3b','#ffffff'],4:['#2f7fd6','#ffffff'],5:['#f2c025','#111111'],6:['#28a35a','#ffffff']};
function chip(n){var a=LC[n]||['#333','#fff'];return '<span class="mc" style="background:'+a[0]+';color:'+a[1]+(n===2?';border:1px solid #3a3f4a':'')+'">'+n+'</span>';}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

var Q=new URLSearchParams(location.search);
var ID=Q.get('id')||'';
var OK=/^\d{12}$/.test(ID);
var JCD=ID.slice(0,2),HD=ID.slice(2,10),RNO=+ID.slice(10,12);
var V=Q.get('v')||'',NO=Q.get('no')||RNO,TM=Q.get('tm')||'';
function combos(k){return (Q.get(k)||'').split(',').filter(function(s){return /^\d(-\d){1,2}$/.test(s);});}
var B2=combos('b2'),B3=combos('b3'),BA=combos('ba');
var SB2={},SB3={},SBA={};B2.forEach(function(c){SB2[c]=1;});B3.forEach(function(c){SB3[c]=1;});BA.forEach(function(c){SBA[c]=1;});

var o2=null,o3=null,at=null,busy=false,fail=false;

function oddsVal(o,c){var v=o&&o[c];return (v==null||v<=0)?null:v;}
function fmt(v){return v==null?'–':(v>=1000?Math.round(v).toLocaleString():v.toFixed(1));}
// 人気順位マップ {combo:順位}
function rankMap(o){
  if(!o)return {};
  var ks=Object.keys(o).filter(function(k){return o[k]>0;}).sort(function(a,b){return o[a]-o[b];});
  var m={};ks.forEach(function(k,i){m[k]=i+1;});return m;
}

function aiRows(list,o,rmap,lab,cls){
  var h='';
  list.forEach(function(c,i){
    var v=oddsVal(o,c),rk=rmap[c];
    h+='<div class="crow"><span class="rk">'+lab+(list.length>1?(i+1):'')+'</span>'
      +c.split('-').map(chip).join('<span class="arr">&rarr;</span>')
      +'<span class="pop">'+(rk?rk+'番人気':'')+'</span>'
      +'<span class="oz" style="color:'+cls+'">'+fmt(v)+(v!=null?'<span style="font-size:10px;color:#8791a3">倍</span>':'')+'</span></div>';
  });
  return h;
}

function exTable(){
  // 2連単30点: 列=1着(6艇)・行=2着(残り5艇昇順)
  var h='<table><tr>';for(var a=1;a<=6;a++)h+='<th>'+chip(a)+'<span style="font-size:9px;color:#5d6675">1着</span></th>';h+='</tr>';
  for(var row=0;row<5;row++){
    h+='<tr>';
    for(var a=1;a<=6;a++){
      var others=[1,2,3,4,5,6].filter(function(x){return x!==a;});
      var b=others[row],c=a+'-'+b,v=oddsVal(o2,c);
      h+='<td class="'+(SB2[c]?'hl2':(v==null?'na':''))+'"><span class="lane">'+b+'</span>'+fmt(v)+'</td>';
    }
    h+='</tr>';
  }
  return h+'</table>';
}

function triTable(){
  // 3連単120点: 1着ごとのブロック（行=2着5艇・各行に3着4点）
  var h='';
  for(var a=1;a<=6;a++){
    var others=[1,2,3,4,5,6].filter(function(x){return x!==a;});
    h+='<div class="blk"><div style="font-size:12px;font-weight:600;color:#9aa3b2;margin:2px 0 3px">1着 '+chip(a)+'</div><table><tr><th style="width:34px">2着</th>';
    for(var i=0;i<4;i++)h+='<th>3着</th>';
    h+='</tr>';
    others.forEach(function(b){
      var thirds=others.filter(function(x){return x!==b;});
      h+='<tr><td style="border-bottom:0.5px solid #2a2f3a">'+chip(b)+'</td>';
      thirds.forEach(function(cc){
        var c=a+'-'+b+'-'+cc,v=oddsVal(o3,c);
        h+='<td class="'+(SB3[c]?'hl3':(SBA[c]?'hla':(v==null?'na':'')))+'"><span class="lane">'+cc+'</span>'+fmt(v)+'</td>';
      });
      h+='</tr>';
    });
    h+='</table></div>';
  }
  return h;
}

function popList(o,n,dim){
  var ks=Object.keys(o||{}).filter(function(k){return o[k]>0;}).sort(function(a,b){return o[a]-o[b];}).slice(0,n);
  if(!ks.length)return '';
  var h='';
  ks.forEach(function(c,i){
    var mk=SB2[c]||SB3[c]?' <span style="font-size:10px;color:#43c59e">AI本線</span>':(SBA[c]?' <span style="font-size:10px;color:#c79bff">AI穴</span>':'');
    h+='<div class="crow"><span class="rk">'+(i+1)+'位</span>'
      +c.split('-').map(chip).join('<span class="arr">&rarr;</span>')+mk
      +'<span class="oz">'+fmt(o[c])+'<span style="font-size:10px;color:#8791a3">倍</span></span></div>';
  });
  return '<div class="sec">'+dim+' 人気順</div>'+h;
}

function render(){
  var app=document.getElementById('app');
  if(!OK){app.innerHTML='<div class="err">レース指定がありません。予想ページ（レース詳細）の「オッズ一覧」ボタンから開いてください。</div>';return;}
  var hd=HD.slice(0,4)+'-'+HD.slice(4,6)+'-'+HD.slice(6,8);
  var h='<a class="back" href="javascript:history.length>1?history.back():location.assign(\'today.html\')">&lsaquo; 予想へ戻る</a>'
    +'<h1>'+esc(V)+' '+esc(NO)+'R オッズ'
    +'<button class="upbtn" id="upd"'+(busy?' disabled':'')+'>'+(busy?'取得中…':'更新')+'</button></h1>'
    +'<div class="meta">'+hd+(TM?'　締切 '+esc(TM):'')
    +(at?'　<span style="color:#43c59e">'+at+' 取得</span>':'')+'　約2分毎に自動更新</div>';
  if(fail&&!o2&&!o3){
    h+='<div class="err">オッズを取得できませんでした。発売前（オッズ未確定）か、公式サイトが混雑しています。少し待つと自動で再取得します。</div>';
  }
  var r2=rankMap(o2),r3=rankMap(o3);
  if(B2.length||B3.length||BA.length){
    h+='<div class="sec">AI買い目の実オッズ<span class="kbadge">本線=緑 / 穴予想=紫</span></div>';
    if(B2.length)h+=aiRows(B2,o2,r2,'2連',' #7fe0bf');
    if(B3.length)h+=aiRows(B3,o3,r3,'3連',' #7fe0bf');
    if(BA.length)h+=aiRows(BA,o3,r3,'穴',' #c79bff');
  }
  h+=popList(o2,5,'2連単')+popList(o3,10,'3連単');
  h+='<div class="sec">2連単 全30点</div>'+exTable();
  h+='<div class="sec">3連単 全120点<span class="kbadge">– は未発売/欠場</span></div>'+triTable();
  h+='<div class="note">※ 公式サイトのオッズを直接取得（2連単/3連単・サーバ側90秒キャッシュ）。オッズは締切まで動きます。'
    +'緑=AI本線の買い目、紫=AI穴予想。「–」は未発売・欠場・取得不可。</div>';
  app.innerHTML=h;
  var b=document.getElementById('upd');if(b)b.onclick=function(){load(true);};
}

function load(force){
  if(!OK||busy)return;
  busy=true;render();
  var q='jcd='+JCD+'&rno='+RNO+'&hd='+HD;
  Promise.all([
    fetch('/api/odds?'+q,{cache:'no-store'}).then(function(x){return x.ok?x.json():null;}).catch(function(){return null;}),
    fetch('/api/odds?'+q+'&type=3t',{cache:'no-store'}).then(function(x){return x.ok?x.json():null;}).catch(function(){return null;})
  ]).then(function(a){
    var n2=a[0]&&a[0].o2,n3=a[1]&&a[1].o3;
    fail=!n2&&!n3;
    if(n2)o2=n2;
    if(n3)o3=n3;
    if(n2||n3)at=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    busy=false;render();
  });
}

render();load(true);
setInterval(function(){if(!document.hidden)load(false);},120000);
document.addEventListener('visibilitychange',function(){if(!document.hidden)load(false);});
})();
</script>
</body>
</html>
