<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>タスク分類プロトタイプ</title>
<style>
  :root {
    --bg: #f2f4f7;
    --card: #ffffff;
    --ink: #1a1d24;
    --sub: #6b7280;
    --brand: #3b6ef5;
    --brand-ink: #ffffff;
    --bot-bg: #eef1f6;
    --user-bg: #3b6ef5;
    --border: #e3e7ee;
    --ok: #16a34a;
    --chip: #f0f3fa;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1218;
      --card: #171b23;
      --ink: #f2f4f7;
      --sub: #9aa3b2;
      --bot-bg: #232935;
      --border: #262c37;
      --chip: #1e2530;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    font-size: 16px;
    line-height: 1.5;
    overscroll-behavior: none;
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--card);
  }
  header {
    padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #3b6ef5, #6a5cf5);
    display: grid; place-items: center; color: #fff; font-size: 18px;
    flex: none;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header p { font-size: 12px; margin: 0; color: var(--sub); }
  header .reset {
    margin-left: auto; border: none; background: var(--chip);
    color: var(--sub); font-size: 12px; padding: 7px 12px;
    border-radius: 20px; font-weight: 600;
  }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .row { display: flex; gap: 8px; align-items: flex-end; animation: pop .25s ease; }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }
  @keyframes pop { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-size: 15px;
    background: linear-gradient(135deg,#3b6ef5,#6a5cf5); color: #fff;
  }
  .bubble {
    max-width: 78%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: 15px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bot .bubble { background: var(--bot-bg); color: var(--ink); border-bottom-left-radius: 5px; }
  .user .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 5px; }
  .options {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 2px 4px 6px 44px;
    animation: pop .3s ease;
  }
  .options button {
    border: 1px solid var(--brand);
    background: transparent;
    color: var(--brand);
    padding: 9px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
  }
  .options button:active { background: var(--brand); color: #fff; transform: scale(.97); }
  .typing { display: flex; gap: 4px; padding: 12px 14px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--sub);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.2s;} .typing span:nth-child(3){ animation-delay:.4s;}
  @keyframes blink { 0%,80%,100%{opacity:.25; transform:translateY(0);} 40%{opacity:1; transform:translateY(-3px);} }

  .result {
    margin: 6px 4px 4px 44px;
    background: var(--chip);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    animation: pop .3s ease;
  }
  .result h3 { margin: 0 0 10px; font-size: 13px; color: var(--sub); font-weight: 700; letter-spacing: .04em; }
  .result .tier { display: flex; align-items: center; gap: 8px; margin: 7px 0; }
  .result .tier .lv { font-size: 11px; color: var(--sub); width: 46px; flex:none; }
  .result .tier .val {
    font-size: 15px; font-weight: 700;
    background: var(--card); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 8px; flex: 1;
  }
  .result .tier.s3 .val { color: var(--ok); border-color: var(--ok); }
  .result .path { margin-top: 10px; font-size: 12px; color: var(--sub); }

  .composer {
    padding: 8px 12px calc(env(safe-area-inset-bottom) + 10px);
    border-top: 1px solid var(--border);
    background: var(--card);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .composer textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    border-radius: 20px;
    padding: 10px 15px;
    font-size: 16px;
    font-family: inherit;
    max-height: 100px;
    line-height: 1.4;
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); }
  .composer button.send {
    flex: none;
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: var(--brand); color: #fff;
    font-size: 19px; display: grid; place-items: center;
  }
  .composer button.send:disabled { opacity: .4; }
  .composer button.send:active:not(:disabled){ transform: scale(.92); }
</style>

<div class="app">
  <header>
    <div class="logo">🗂️</div>
    <div>
      <h1>タスク分類アシスタント</h1>
      <p>質問に答えて分類を確定</p>
    </div>
    <button class="reset" onclick="resetChat()">最初から</button>
  </header>

  <div class="chat" id="chat"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="タスクをざっくり入力…" autocomplete="off"></textarea>
    <button class="send" id="send" disabled>➤</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

// ------- 簡易分類フロー定義（APIの代わりのダミー質問パターン）-------
// 各質問は選択肢を持ち、選んだ結果で大分類/中分類/小分類を確定していく。
// 設計・開発・技術チーム向けの分類。
// 大分類=作業の種類 / 中分類=その細分 / 小分類=どこまでやるか(完成度・ゴール段階)
const FLOW = [
  {
    key: 'major',
    label: '大分類',
    q: '「{task}」ですね。これはどんな作業ですか？',
    options: ['設計', '開発・実装', '試作・実験', '技術検討・調査', 'ドキュメント', '改善・保守']
  },
  {
    key: 'mid',
    label: '中分類',
    q: 'なるほど「{major}」ですね。もう少し詳しく、どれに近いですか？',
    // 大分類ごとに中分類の選択肢を出し分け
    optionsByMajor: {
      '設計':       ['構想設計', '詳細設計', '図面作成', '仕様書作成'],
      '開発・実装':   ['ソフト実装', 'ハード製作', '回路・基板', '治具・装置'],
      '試作・実験':   ['試作品製作', '動作確認', '性能評価', 'データ取得'],
      '技術検討・調査': ['方式検討', '技術調査', '他社・特許調査', '見積・試算'],
      'ドキュメント':  ['提案資料', '報告書', 'マニュアル', '議事録'],
      '改善・保守':   ['不具合対応', '改良・改善', '定期メンテ', '問い合わせ対応']
    }
  },
  {
    key: 'minor',
    label: '小分類',
    // 小分類=完成度・ゴール段階。どこまでやるかを揃える
    q: '最後に、この「{mid}」はどこまでやりますか？（ゴールの段階）',
    options: ['検討・調査まで', '設計・作成まで', '試作・テストまで', 'レビュー・承認まで', '最終納品・リリースまで']
  }
];

let state = {};   // { task, major, mid, minor }
let step = 0;     // FLOW のインデックス

function scrollDown() {
  requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight);
}

function addBot(text) {
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = `<div class="avatar">🤖</div><div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function addUser(text) {
  const row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row bot typing-row';
  row.innerHTML = `<div class="avatar">🤖</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(row);
  scrollDown();
  return row;
}

function fill(tpl) {
  return tpl
    .replace('{task}', state.task || '')
    .replace('{major}', state.major || '')
    .replace('{mid}', state.mid || '');
}

// 選択肢ボタンを表示
function showOptions(opts, onPick) {
  const box = document.createElement('div');
  box.className = 'options';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.textContent = o;
    b.onclick = () => {
      box.remove();      // 選んだら選択肢を消す
      onPick(o);
    };
    box.appendChild(b);
  });
  chat.appendChild(box);
  scrollDown();
}

// bot発言 → タイピング演出 → 質問と選択肢
function askStep() {
  if (step >= FLOW.length) { showResult(); return; }
  const node = FLOW[step];
  const typing = showTyping();
  setTimeout(() => {
    typing.remove();
    addBot(fill(node.q));

    let opts = node.options;
    if (node.optionsByMajor) opts = node.optionsByMajor[state.major] || node.options || [];

    setTimeout(() => {
      showOptions(opts, (choice) => {
        addUser(choice);
        state[node.key] = choice;
        step++;
        setTimeout(askStep, 350);
      });
    }, 200);
  }, 700);
}

function showResult() {
  const typing = showTyping();
  setTimeout(() => {
    typing.remove();
    addBot('分類が確定しました！こちらでどうでしょう？');
    const box = document.createElement('div');
    box.className = 'result';
    box.innerHTML = `
      <h3>📋 分類結果</h3>
      <div class="tier"><span class="lv">大分類</span><span class="val">${state.major}</span></div>
      <div class="tier"><span class="lv">中分類</span><span class="val">${state.mid}</span></div>
      <div class="tier s3"><span class="lv">小分類</span><span class="val">${state.minor}</span></div>
      <div class="path">🗂️ ${state.task} ／ ${state.major} › ${state.mid} › ${state.minor}</div>
    `;
    chat.appendChild(box);
    scrollDown();
    setTimeout(() => addBot('別のタスクを分類するには「最初から」を押すか、下に入力してください。'), 500);
  }, 800);
}

// ------- 入力欄の挙動 -------
function autogrow() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  sendBtn.disabled = input.value.trim() === '';
}
input.addEventListener('input', autogrow);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
sendBtn.addEventListener('click', submit);

function submit() {
  const text = input.value.trim();
  if (!text) return;
  // 新しいタスク入力 → フローをリセットして開始
  state = { task: text };
  step = 0;
  addUser(text);
  input.value = '';
  autogrow();
  setTimeout(askStep, 400);
}

function resetChat() {
  chat.innerHTML = '';
  state = {}; step = 0;
  greet();
}

function greet() {
  setTimeout(() => addBot('こんにちは！分類したいタスクを入力してください。\n例：「冷却装置の図面を作る」「試作品の動作確認」'), 300);
}

greet();
</script>
