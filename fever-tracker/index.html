<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff8fa3">
<title>おねつノート | 発熱ケア記録</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1>🌡️ おねつノート</h1>
    <p class="subtitle">発熱したときだけ使う記録アプリ</p>
  </header>

  <main>

    <!-- お薬ステータス -->
    <section class="card" id="medStatusCard">
      <h2>お薬の状況</h2>
      <div id="medStatusList" class="med-status-list">
        <p class="empty-hint">まだお薬の記録はありません</p>
      </div>
    </section>

    <!-- 体温グラフ -->
    <section class="card">
      <h2>体温の推移</h2>
      <div class="chart-wrap">
        <canvas id="tempChart" height="220"></canvas>
      </div>
      <p class="empty-hint" id="chartEmptyHint">体温を記録するとグラフが表示されます</p>
    </section>

    <!-- アクションボタン -->
    <section class="action-buttons">
      <button class="btn btn-primary" id="openTempModalBtn">
        <span class="btn-icon">🌡️</span>体温・症状を記録
      </button>
      <button class="btn btn-secondary" id="openMedModalBtn">
        <span class="btn-icon">💊</span>お薬を記録
      </button>
    </section>

    <!-- 記録一覧 -->
    <section class="card">
      <h2>記録一覧</h2>
      <div id="recordList" class="record-list">
        <p class="empty-hint">まだ記録がありません</p>
      </div>
    </section>

    <button class="btn btn-reset" id="resetBtn">🗑️ すべての記録を消去（発熱が治ったら）</button>

  </main>
</div>

<!-- 体温記録モーダル -->
<div class="modal-overlay" id="tempModalOverlay">
  <div class="modal">
    <h3>🌡️ 体温・症状を記録</h3>
    <form id="tempForm">
      <label class="field">
        <span>測定時間</span>
        <input type="datetime-local" id="tempTime" required>
      </label>
      <label class="field">
        <span>体温（℃）</span>
        <input type="number" id="tempValue" step="0.1" min="34" max="42" placeholder="例：38.5" required inputmode="decimal">
      </label>
      <div class="field">
        <span>症状（複数選択可）</span>
        <div class="symptom-grid" id="symptomGrid"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-text" data-close>キャンセル</button>
        <button type="submit" class="btn btn-primary">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- お薬記録モーダル -->
<div class="modal-overlay" id="medModalOverlay">
  <div class="modal">
    <h3>💊 お薬を記録</h3>
    <form id="medForm">
      <label class="field">
        <span>お薬の種類</span>
        <select id="medType" required>
          <option value="acetaminophen" data-hours="6">アセトアミノフェン（カロナール／アンヒバ等）</option>
          <option value="ibuprofen" data-hours="8">イブプロフェン（ブルフェン等）</option>
          <option value="other" data-hours="6">その他</option>
        </select>
      </label>
      <label class="field" id="medOtherNameField" hidden>
        <span>お薬の名前</span>
        <input type="text" id="medOtherName" placeholder="例：坐薬〇〇">
      </label>
      <label class="field">
        <span>次まであける時間（時間）</span>
        <input type="number" id="medInterval" min="1" max="24" step="0.5" value="6" required inputmode="decimal">
      </label>
      <label class="field">
        <span>服用した時間</span>
        <input type="datetime-local" id="medTime" required>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-text" data-close>キャンセル</button>
        <button type="submit" class="btn btn-primary">保存する</button>
      </div>
    </form>
  </div>
</div>

<script src="chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
